<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUIVI.STUDIO · Tableau de bord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --grad: linear-gradient(160deg,#3ECFEA 0%,#2EC98A 45%,#E5C23A 100%);
      --dk:#0E1A12; --dk55:rgba(14,26,18,.55); --dk38:rgba(14,26,18,.38);
      --dk12:rgba(14,26,18,.10); --dk08:rgba(14,26,18,.06);
      --white:#EDE8DE; --pill-bg:rgba(14,26,18,.86);
      --card:rgba(255,255,255,.22); --card-border:rgba(255,255,255,.35);
    }
    body { font-family:'DM Mono',monospace; min-height:100vh; background:var(--grad); color:var(--dk); -webkit-font-smoothing:antialiased; }
    nav { display:flex; justify-content:space-between; align-items:center; padding:1.4rem 2rem; border-bottom:1px solid var(--dk12); }
    .nav-brand { font-size:11px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; }
    .nav-tag   { font-size:9px; letter-spacing:.1em; color:var(--dk55); }
    .container { max-width:960px; margin:0 auto; padding:2.5rem 2rem 4rem; }

    /* SEARCH */
    .search-wrap { display:flex; gap:.75rem; margin-bottom:2rem; }
    .search-input { flex:1; background:rgba(255,255,255,.2); border:1px solid rgba(14,26,18,.15); border-radius:8px; padding:.7rem 1rem; font-family:'DM Mono',monospace; font-size:.85rem; color:var(--dk); outline:none; transition:border-color .2s; }
    .search-input:focus { border-color:var(--dk55); }
    .btn-load { background:var(--pill-bg); color:var(--white); font-family:'DM Mono',monospace; font-size:.78rem; font-weight:500; letter-spacing:.06em; padding:12px 22px; border-radius:100px; border:none; cursor:pointer; white-space:nowrap; transition:background .2s; }
    .btn-load:hover { background:rgba(14,26,18,.96); }

    /* STATE */
    .state-msg { text-align:center; padding:4rem 2rem; font-size:.82rem; color:var(--dk55); font-style:italic; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    .loading { animation:pulse 1.5s ease-in-out infinite; }

    /* BREADCRUMB */
    .breadcrumb { display:flex; align-items:center; gap:.5rem; margin-bottom:1.5rem; font-size:.7rem; color:var(--dk55); flex-wrap:wrap; }
    .crumb { cursor:pointer; letter-spacing:.06em; }
    .crumb:hover { color:var(--dk); }
    .crumb.active { color:var(--dk); font-weight:500; cursor:default; }
    .crumb-sep { opacity:.4; }

    /* STUDENT HEADER */
    .dash-header { margin-bottom:1.5rem; }
    .student-title { font-size:1.6rem; font-weight:500; letter-spacing:-.025em; }
    .student-sub   { font-size:.72rem; color:var(--dk55); font-style:italic; margin-top:.25rem; }

    /* METRICS */
    .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:.75rem; margin-bottom:1.25rem; }
    .metric { background:var(--card); border:1px solid var(--card-border); border-radius:8px; padding:.9rem 1rem; }
    .metric-label { font-size:.58rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--dk55); margin-bottom:.35rem; }
    .metric-val   { font-size:1.5rem; font-weight:500; letter-spacing:-.02em; line-height:1; }
    .metric-sub   { font-size:.62rem; color:var(--dk38); margin-top:.25rem; }

    /* GRID */
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:.75rem; }
    .full  { margin-bottom:.75rem; }
    .card  { background:var(--card); border:1px solid var(--card-border); border-radius:8px; padding:1.2rem 1.3rem; }
    .card-title { font-size:.58rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--dk55); margin-bottom:.9rem; }
    .chart-wrap { position:relative; height:170px; }

    /* MATIERE CARDS */
    .matiere-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:.75rem; margin-bottom:1rem; }
    .matiere-card { background:var(--card); border:1px solid var(--card-border); border-radius:8px; padding:1.1rem 1.2rem; cursor:pointer; transition:all .2s; }
    .matiere-card:hover { background:rgba(255,255,255,.38); border-color:var(--dk38); transform:translateY(-1px); }
    .matiere-name  { font-size:1rem; font-weight:500; margin-bottom:.4rem; }
    .matiere-stats { font-size:.68rem; color:var(--dk55); line-height:1.8; }
    .matiere-score { font-size:1.4rem; font-weight:500; margin-top:.5rem; }
    .score-good { color:#1a6e3c; }
    .score-mid  { color:#8a5a00; }
    .score-low  { color:#8B1A10; }

    /* SUJET LIST */
    .sujet-row { display:flex; align-items:center; gap:.75rem; padding:.75rem 0; border-bottom:1px solid var(--dk12); cursor:pointer; transition:opacity .15s; }
    .sujet-row:last-child { border-bottom:none; }
    .sujet-row:hover { opacity:.75; }
    .sujet-name  { flex:1; font-size:.85rem; font-weight:500; }
    .sujet-meta  { font-size:.68rem; color:var(--dk55); }
    .sujet-score { font-size:.85rem; font-weight:500; flex-shrink:0; }
    .sujet-arrow { font-size:.7rem; color:var(--dk38); flex-shrink:0; }

    /* BAR ROWS */
    .bar-row { display:flex; align-items:center; gap:.6rem; margin-bottom:.5rem; }
    .bar-label { font-size:.68rem; color:var(--dk55); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .bar-track { width:100px; height:6px; background:var(--dk08); border-radius:3px; overflow:hidden; flex-shrink:0; }
    .bar-fill  { height:100%; border-radius:3px; }
    .bar-val   { font-size:.68rem; font-weight:500; width:32px; text-align:right; flex-shrink:0; }

    /* HISTORY */
    .history-row { display:flex; align-items:center; gap:.75rem; padding:.6rem 0; border-bottom:1px solid var(--dk12); font-size:.75rem; }
    .history-row:last-child { border-bottom:none; }
    .history-date    { color:var(--dk55); width:90px; flex-shrink:0; font-size:.65rem; }
    .history-subject { flex:1; font-weight:500; }
    .history-score   { font-weight:500; flex-shrink:0; }

    /* WORD CLOUD */
    .word-cloud { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .word-tag { font-size:.72rem; font-weight:500; padding:3px 10px; border-radius:20px; cursor:default; }

    /* BUTTONS */
    .btn-action { font-family:'DM Mono',monospace; font-size:.68rem; font-weight:500; letter-spacing:.1em; text-transform:uppercase; padding:6px 14px; border-radius:100px; border:1px solid var(--dk12); background:rgba(255,255,255,.2); color:var(--dk55); cursor:pointer; transition:all .2s; }
    .btn-action:hover { background:rgba(255,255,255,.4); color:var(--dk); border-color:var(--dk38); }

    .divider { height:1px; background:var(--dk12); margin:1rem 0; }
    footer { text-align:center; padding:1.5rem; font-size:.68rem; color:var(--dk38); letter-spacing:.06em; border-top:1px solid var(--dk12); }

    .view { display:none; }
    .view.active { display:block; }
  </style>
</head>
<body>
<nav>
  <span class="nav-brand">SUIVI.STUDIO</span>
  <span class="nav-tag">Tableau de bord</span>
</nav>

<div class="container">
  <div class="search-wrap">
    <input class="search-input" id="nameInput" type="text" placeholder="Prénom de l'élève…" onkeydown="if(event.key==='Enter')loadDashboard()">
    <button class="btn-load" onclick="loadDashboard()">Charger →</button>
  </div>

  <div class="state-msg" id="stateMsg">Entre un prénom pour charger le tableau de bord.</div>

  <!-- BREADCRUMB -->
  <div class="breadcrumb" id="breadcrumb" style="display:none">
    <span class="crumb" id="crumbStudent" onclick="goTo('matieres')"></span>
    <span class="crumb-sep" id="crumbSep1" style="display:none">›</span>
    <span class="crumb" id="crumbMatiere" onclick="goTo('sujets')" style="display:none"></span>
    <span class="crumb-sep" id="crumbSep2" style="display:none">›</span>
    <span class="crumb active" id="crumbSujet" style="display:none"></span>
  </div>

  <!-- VIEW: MATIERES -->
  <div class="view" id="viewMatieres">
    <div class="dash-header">
      <div class="student-title" id="mStudentTitle"></div>
      <div class="student-sub" id="mStudentSub"></div>
    </div>
    <div class="metrics" id="mMetrics"></div>
    <div class="card full">
      <div class="card-title">Matières</div>
      <div class="matiere-grid" id="matiereGrid"></div>
    </div>
  </div>

  <!-- VIEW: SUJETS -->
  <div class="view" id="viewSujets">
    <div class="dash-header">
      <div class="student-title" id="sTitle"></div>
      <div class="student-sub" id="sSub"></div>
    </div>
    <div class="metrics" id="sMetrics"></div>
    <div class="card full">
      <div class="card-title">Sujets</div>
      <div id="sujetList"></div>
    </div>
  </div>

  <!-- VIEW: DETAIL -->
  <div class="view" id="viewDetail">
    <div class="dash-header">
      <div class="student-title" id="dTitle"></div>
      <div class="student-sub" id="dSub"></div>
    </div>
    <div class="metrics" id="dMetrics"></div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">Progression · scores dans le temps</div>
        <div class="chart-wrap"><canvas id="chartProgress"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Distribution des scores</div>
        <div class="chart-wrap"><canvas id="chartDist"></canvas></div>
      </div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">Questions les plus ratées</div>
        <div id="weakQuestions"></div>
      </div>
      <div class="card">
        <div class="card-title">Notions à retravailler</div>
        <div id="wordCloudContainer"><div class="word-cloud" id="wordCloud"></div></div>
      </div>
    </div>
    <div class="card full">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem">
        <span class="card-title" style="margin-bottom:0">Historique</span>
        <button class="btn-action" onclick="exportCSV()">Exporter CSV</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<footer>SUIVI.STUDIO · Ton suivi, ta stratégie ! · Quiz generator</footer>

<script>
const SUPABASE_URL = 'https://ycoqsxxegwfazweebbax.supabase.co';
const TAVILY_KEY   = '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';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljb3FzeHhlZ3dmYXp3ZWViYmF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5ODc2NzksImV4cCI6MjA5MjU2MzY3OX0.DdPAsZcWWZMdWgQesP6G0GooK_ejnsTPp05_lwRMi-8';

let allResults = [];
let currentStudent = '';
let currentMatiere = '';
let currentSujet   = '';
let chartProgress  = null;
let chartDist      = null;

// ── LOAD ─────────────────────────────────────────────────────
window.loadDashboard = async function() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  currentStudent = name;
  setMsg('Chargement…', true);
  hideAll();

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/quiz_results?student_name=ilike.${encodeURIComponent(name)}&order=quiz_date.asc`,
      { headers:{ 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allResults = await res.json();
    if (!allResults.length) { setMsg(`Aucun résultat trouvé pour "${name}".`); return; }
    setMsg('');
    goTo('matieres');
  } catch(e) { setMsg('Erreur : ' + e.message); }
};

// ── NAVIGATION ────────────────────────────────────────────────
window.goTo = function(view, matiere, sujet) {
  if (matiere !== undefined) currentMatiere = matiere;
  if (sujet   !== undefined) currentSujet   = sujet;
  hideAll();
  updateBreadcrumb(view);
  if (view === 'matieres') renderMatieres();
  if (view === 'sujets')   renderSujets();
  if (view === 'detail')   renderDetail();
};

function hideAll() {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
}

function updateBreadcrumb(view) {
  const bc = document.getElementById('breadcrumb');
  bc.style.display = 'flex';
  document.getElementById('crumbStudent').textContent = currentStudent;
  const sep1 = document.getElementById('crumbSep1');
  const cm   = document.getElementById('crumbMatiere');
  const sep2 = document.getElementById('crumbSep2');
  const cs   = document.getElementById('crumbSujet');

  if (view === 'matieres') {
    sep1.style.display='none'; cm.style.display='none';
    sep2.style.display='none'; cs.style.display='none';
    document.getElementById('crumbStudent').className='crumb active';
  } else if (view === 'sujets') {
    sep1.style.display=''; cm.style.display='';
    cm.textContent = currentMatiere || 'Toutes matières';
    sep2.style.display='none'; cs.style.display='none';
    document.getElementById('crumbStudent').className='crumb';
    cm.className='crumb active';
  } else if (view === 'detail') {
    sep1.style.display=''; cm.style.display='';
    cm.textContent = currentMatiere || 'Toutes matières';
    sep2.style.display=''; cs.style.display='';
    cs.textContent = currentSujet;
    document.getElementById('crumbStudent').className='crumb';
    cm.className='crumb';
    cs.className='crumb active';
  }
}

// ── VIEW: MATIERES ────────────────────────────────────────────
function renderMatieres() {
  document.getElementById('viewMatieres').classList.add('active');
  const scores = allResults.map(r => pct(r));
  const avg    = mean(scores);
  const matieres = groupBy(allResults, r => r.matiere || 'Non spécifié');

  document.getElementById('mStudentTitle').textContent = currentStudent;
  document.getElementById('mStudentSub').textContent =
    Object.keys(matieres).length + ' matière(s) · ' + allResults.length + ' quiz complétés';

  // Global metrics
  document.getElementById('mMetrics').innerHTML = metricCards([
    { label:'Quiz complétés', val:allResults.length, sub: Object.keys(matieres).length + ' matière(s)' },
    { label:'Score global moyen', val:avg+'%', sub: trendLabel(scores) },
    { label:'Meilleure matière', val: bestMatiere(matieres).name, sub: bestMatiere(matieres).avg+'%' },
    { label:'À renforcer', val: worstMatiere(matieres).name, sub: worstMatiere(matieres).avg+'%' },
  ]);

  // Matière cards
  const grid = document.getElementById('matiereGrid');
  grid.innerHTML = '';
  Object.entries(matieres).forEach(([mat, rows]) => {
    const s = rows.map(r => pct(r));
    const a = mean(s);
    const cls = a>=70?'score-good':a>=50?'score-mid':'score-low';
    const sujets = [...new Set(rows.map(r => r.subject).filter(Boolean))];
    grid.innerHTML += `<div class="matiere-card" onclick="goTo('sujets','${esc(mat)}')">
      <div class="matiere-name">${mat}</div>
      <div class="matiere-stats">${rows.length} quiz · ${sujets.length} sujet(s)</div>
      <div class="matiere-score ${cls}">${a}%</div>
    </div>`;
  });
}

// ── VIEW: SUJETS ──────────────────────────────────────────────
function renderSujets() {
  document.getElementById('viewSujets').classList.add('active');
  const rows = allResults.filter(r => (r.matiere||'Non spécifié') === currentMatiere);
  const scores = rows.map(r => pct(r));
  const avg = mean(scores);
  const sujets = groupBy(rows, r => r.subject || 'Non spécifié');

  document.getElementById('sTitle').textContent = currentMatiere;
  document.getElementById('sSub').textContent =
    currentStudent + ' · ' + rows.length + ' quiz · ' + Object.keys(sujets).length + ' sujet(s)';

  document.getElementById('sMetrics').innerHTML = metricCards([
    { label:'Quiz complétés', val:rows.length, sub: Object.keys(sujets).length + ' sujet(s)' },
    { label:'Score moyen', val:avg+'%', sub: trendLabel(scores) },
    { label:'Meilleur score', val:Math.max(...scores)+'%', sub: '' },
    { label:'Dernier quiz', val:pct(rows[rows.length-1])+'%', sub: fmtDate(rows[rows.length-1].quiz_date) },
  ]);

  const list = document.getElementById('sujetList');
  list.innerHTML = '';
  Object.entries(sujets).forEach(([subj, sr]) => {
    const s  = sr.map(r => pct(r));
    const a  = mean(s);
    const cls = a>=70?'score-good':a>=50?'score-mid':'score-low';
    list.innerHTML += `<div class="sujet-row" onclick="goTo('detail','${esc(currentMatiere)}','${esc(subj)}')">
      <div class="sujet-name">${subj}</div>
      <div class="sujet-meta">${sr.length} quiz</div>
      <div class="sujet-score ${cls}">${a}%</div>
      <div class="sujet-arrow">›</div>
    </div>`;
  });
}

// ── VIEW: DETAIL ──────────────────────────────────────────────
function renderDetail() {
  document.getElementById('viewDetail').classList.add('active');
  const rows = allResults.filter(r =>
    (r.matiere||'Non spécifié') === currentMatiere &&
    (r.subject||'Non spécifié') === currentSujet
  );
  const scores = rows.map(r => pct(r));
  const avg    = mean(scores);

  document.getElementById('dTitle').textContent = currentSujet;
  document.getElementById('dSub').textContent =
    currentStudent + ' · ' + currentMatiere + ' · ' + rows.length + ' quiz';

  document.getElementById('dMetrics').innerHTML = metricCards([
    { label:'Quiz complétés', val:rows.length, sub:'' },
    { label:'Score moyen', val:avg+'%', sub: trendLabel(scores) },
    { label:'Meilleur score', val:Math.max(...scores)+'%', sub:'' },
    { label:'Dernier score', val:scores[scores.length-1]+'%', sub: fmtDate(rows[rows.length-1].quiz_date) },
  ]);

  renderProgressChart(rows, scores);
  renderDistChart(scores);
  renderWeakQuestions(rows);
  renderWordCloud(rows);
  renderHistory(rows, scores);
}

function renderProgressChart(rows, scores) {
  if (chartProgress) chartProgress.destroy();
  chartProgress = new Chart(document.getElementById('chartProgress'), {
    type:'line',
    data:{
      labels: rows.map(r => fmtDate(r.quiz_date)),
      datasets:[{ data:scores, borderColor:'#0E1A12', backgroundColor:'rgba(14,26,18,.07)', borderWidth:2, pointRadius:4, pointBackgroundColor:scores.map(s=>s>=70?'#1D9E75':s>=50?'#EF9F27':'#D85A30'), tension:.3, fill:true }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y+'%'}}}, scales:{ y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{family:'DM Mono',size:10}},grid:{color:'rgba(14,26,18,.06)'}}, x:{ticks:{font:{family:'DM Mono',size:10}},grid:{display:false}} } }
  });
}

function renderDistChart(scores) {
  if (chartDist) chartDist.destroy();
  const b=[0,0,0,0,0];
  scores.forEach(s=>{ if(s<40)b[0]++;else if(s<55)b[1]++;else if(s<70)b[2]++;else if(s<85)b[3]++;else b[4]++; });
  const total = scores.length || 1;
  const pcts  = b.map(v => Math.round((v/total)*100));
  chartDist = new Chart(document.getElementById('chartDist'), {
    type:'bar',
    data:{ labels:['< 40%','40–55%','55–70%','70–85%','85%+'], datasets:[{data:pcts,backgroundColor:['#F09595','#FAC775','#FAC775','#97C459','#5DCAA5'],borderRadius:4}] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ctx.parsed.y+'% des quiz' } } },
      scales:{
        y:{ min:0, max:100, ticks:{ callback:v=>v+'%', font:{family:'DM Mono',size:10} }, grid:{color:'rgba(14,26,18,.06)'}},
        x:{ ticks:{font:{family:'DM Mono',size:10}}, grid:{display:false} }
      }
    }
  });
}

function renderWeakQuestions(rows) {
  const all = rows.flatMap(r => r.answers||[]);
  // Group by concept
  const byConcept = {};
  all.forEach(a => {
    const k = a.concept || extractConcept(a.question_fr||'?');
    if (!byConcept[k]) byConcept[k]={total:0,wrong:0,questions:[]};
    byConcept[k].total++;
    if (!a.is_correct) {
      byConcept[k].wrong++;
      byConcept[k].questions.push(a);
    }
  });
  const sorted = Object.entries(byConcept)
    .map(([c,v])=>({c, pct:Math.round((v.wrong/v.total)*100), questions:v.questions, total:v.total}))
    .filter(x=>x.pct>0).sort((a,b)=>b.pct-a.pct).slice(0,7);

  const el = document.getElementById('weakQuestions');
  el.innerHTML = '';
  if (!sorted.length) { el.innerHTML='<p style="font-size:.72rem;color:var(--dk55);font-style:italic">Aucune erreur enregistrée.</p>'; return; }

  sorted.forEach((item,i) => {
    const col = item.pct>=70?'#D85A30':item.pct>=40?'#EF9F27':'#1D9E75';
    const id  = 'concept-detail-'+i;
    el.innerHTML+=`
      <div style="margin-bottom:.5rem">
        <div class="bar-row" style="cursor:pointer" onclick="toggleConcept('${id}')">
          <span class="bar-label" style="font-weight:500">${item.c}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${item.pct}%;background:${col}"></div></div>
          <span class="bar-val" style="color:${col}">${item.pct}%</span>
          <span style="font-size:.6rem;color:var(--dk38);margin-left:4px">▾</span>
        </div>
        <div id="${id}" style="display:none;margin-left:.5rem;padding:.5rem .75rem;background:rgba(255,255,255,.15);border-radius:6px;margin-top:2px">
          ${item.questions.slice(0,3).map(q=>`
            <div style="font-size:.68rem;border-bottom:1px solid var(--dk12);padding:.4rem 0;line-height:1.5">
              <div style="font-weight:500;margin-bottom:.2rem">${q.question_fr||''}</div>
              <div style="color:#D85A30">✗ ${q.chosen_answer_fr||q.chosen_answer||'—'}</div>
              <div style="color:#1a6e3c">✓ ${q.correct_answer_fr||q.correct_answer||'—'}</div>
              ${q.explanation_fr?`<div style="color:var(--dk55);margin-top:.2rem;font-style:italic">${q.explanation_fr}</div>`:''}
            </div>`).join('')}
        </div>
      </div>`;
  });
}

window.toggleConcept = function(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
};

function extractConcept(q) {
  // fallback: use first 4 words as concept label
  return q.split(' ').slice(0,4).join(' ')+'…';
}

function renderWordCloud(rows) {
  const all = rows.flatMap(r=>r.answers||[]).filter(a=>!a.is_correct);
  const concepts = {};
  all.forEach(a=>{
    const k = a.concept || extractConcept(a.question_fr||'?');
    concepts[k]=(concepts[k]||0)+1;
  });
  const sorted = Object.entries(concepts).sort((a,b)=>b[1]-a[1]);
  const colors=[{bg:'#FCEBEB',c:'#A32D2D'},{bg:'#FAEEDA',c:'#854F0B'},{bg:'#E6F1FB',c:'#185FA5'},{bg:'#EAF3DE',c:'#3B6D11'},{bg:'#EEEDFE',c:'#534AB7'}];
  const container = document.getElementById('wordCloudContainer');
  const el = document.getElementById('wordCloud');
  el.innerHTML='';
  if (!sorted.length) { el.innerHTML='<p style="font-size:.72rem;color:var(--dk55);font-style:italic">Pas encore assez de données.</p>'; return; }
  const max=sorted[0][1];
  sorted.slice(0,14).forEach(([w,n],i)=>{
    const sz=Math.round(10+(n/max)*9);
    const col=colors[i%colors.length];
    const safeW = w.replace(/'/g,"&apos;").replace(/"/g,'&quot;');
    el.innerHTML+=`<span class="word-tag" style="font-size:${sz}px;background:${col.bg};color:${col.c};cursor:pointer;border:1px solid transparent;transition:border .15s" title="Cliquer pour trouver des ressources" onclick="searchConcept('${safeW}',this)">${w} <span style="font-size:.6em;opacity:.6">↗</span></span>`;
  });
}

window.searchConcept = async function(concept, tagEl) {
  // Find or create resource panel below word cloud
  let panel = document.getElementById('conceptResourcePanel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'conceptResourcePanel';
    panel.style.cssText = 'margin-top:1rem;padding:.85rem 1rem;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);border-radius:8px';
    document.getElementById('wordCloud').parentElement.appendChild(panel);
  }

  // Highlight selected tag
  document.querySelectorAll('.word-tag').forEach(t => t.style.border='1px solid transparent');
  tagEl.style.border = '1px solid rgba(14,26,18,.4)';

  panel.innerHTML = `<div style="font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dk55);margin-bottom:.5rem">Ressources · ${concept}</div><p style="font-size:.72rem;color:var(--dk55);font-style:italic">Recherche en cours…</p>`;

  try {
    const key = (typeof TAVILY_KEY !== 'undefined' && TAVILY_KEY !== 'YOUR_TAVILY_KEY')
      ? TAVILY_KEY : prompt('Entre ta clé Tavily (tvly-…) pour la recherche :');
    if (!key || !key.startsWith('tvly-')) throw new Error('Clé Tavily invalide');

    const q = `${concept} ${currentMatiere||''} cours explication ressource pédagogique`;
    const res = await fetch('https://api.tavily.com/search', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ api_key:key, query:q, search_depth:'basic', max_results:5, include_answer:true })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const results = data.results||[];

    let html = `<div style="font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dk55);margin-bottom:.5rem">Ressources · ${concept}</div>`;
    if (data.answer) html += `<p style="font-size:.7rem;font-style:italic;color:var(--dk55);line-height:1.6;margin-bottom:.6rem;padding:.5rem .75rem;background:rgba(255,255,255,.2);border-radius:5px">${data.answer.slice(0,250)}…</p>`;
    if (!results.length) { html += '<p style="font-size:.7rem;color:var(--dk55)">Aucune ressource trouvée.</p>'; }
    results.slice(0,4).forEach(r => {
      const url = r.url||'';
      const isPDF = url.toLowerCase().endsWith('.pdf');
      const domain = (() => { try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url; } })();
      const typeLabel = isPDF?'PDF':url.includes('khanacademy')?'Khan Academy':url.includes('youtube')||url.includes('lumni')?'Vidéo':'Article';
      const typeBg   = isPDF?'#FCEBEB':url.includes('khanacademy')?'#EAF3DE':url.includes('youtube')?'#E6F1FB':'rgba(14,26,18,.08)';
      html += `<div style="padding:.45rem 0;border-bottom:1px solid var(--dk12)">
        <div style="display:flex;gap:.4rem;align-items:center;margin-bottom:.15rem">
          <span style="padding:1px 7px;border-radius:10px;font-size:.58rem;background:${typeBg}">${typeLabel}</span>
          <span style="font-size:.65rem;color:var(--dk55)">${domain}</span>
        </div>
        <div style="font-size:.72rem;font-weight:500;line-height:1.3;margin-bottom:.2rem">${r.title||'Ressource'}</div>
        <a href="${url}" target="_blank" rel="noopener" style="font-size:.65rem;color:var(--dk);border-bottom:1px solid var(--dk38)">Accéder →</a>
      </div>`;
    });
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = `<div style="font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dk55);margin-bottom:.5rem">Ressources · ${concept}</div><p style="font-size:.72rem;color:#8B1A10">Erreur : ${e.message}</p>`;
  }
};

function renderHistory(rows, scores) {
  const el = document.getElementById('historyList');
  el.innerHTML='';
  [...rows].reverse().forEach((r,i)=>{
    const s=scores[scores.length-1-i];
    const cls=s>=70?'score-good':s>=50?'score-mid':'score-low';
    el.innerHTML+=`<div class="history-row"><span class="history-date">${fmtDate(r.quiz_date)}</span><span class="history-subject">${r.subject||'—'}</span><span class="history-score ${cls}">${r.score}/${r.total} · ${s}%</span></div>`;
  });
}

window.exportCSV = function() {
  const rows=[['Date','Élève','Matière','Sujet','Score','Total','%']];
  allResults.filter(r=>(r.matiere||'Non spécifié')===currentMatiere&&(r.subject||'Non spécifié')===currentSujet)
    .forEach(r=>{ rows.push([fmtDate(r.quiz_date),r.student_name,r.matiere||'',r.subject||'',r.score,r.total,pct(r)+'%']); });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`suivi_${currentStudent}_${currentSujet}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
};

// ── HELPERS ───────────────────────────────────────────────────
function pct(r)   { return Math.round((r.score/r.total)*100); }
function mean(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }
function esc(s)   { return (s||'').replace(/'/g,"\\'"); }
function fmtDate(d){ return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}); }
function groupBy(arr,fn){ const g={}; arr.forEach(r=>{ const k=fn(r)||'Non spécifié'; if(!g[k])g[k]=[]; g[k].push(r); }); return g; }

function trendLabel(scores) {
  if (scores.length < 2) return 'Premier quiz';
  const diff = scores[scores.length-1] - scores[0];
  return (diff>=0?'+':'')+diff+'% depuis le début';
}

function bestMatiere(matieres) {
  let best={name:'—',avg:0};
  Object.entries(matieres).forEach(([m,rows])=>{ const a=mean(rows.map(r=>pct(r))); if(a>best.avg)best={name:m,avg:a}; });
  return best;
}
function worstMatiere(matieres) {
  let worst={name:'—',avg:100};
  Object.entries(matieres).forEach(([m,rows])=>{ const a=mean(rows.map(r=>pct(r))); if(a<worst.avg)worst={name:m,avg:a}; });
  return worst;
}

function metricCards(items) {
  return items.map(m=>`<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-val">${m.val}</div><div class="metric-sub">${m.sub||''}</div></div>`).join('');
}

function setMsg(msg, loading=false) {
  const el=document.getElementById('stateMsg');
  el.textContent=msg; el.className='state-msg'+(loading?' loading':'');
  el.style.display=msg?'block':'none';
}
</script>
